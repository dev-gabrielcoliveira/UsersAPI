apiVersion: apps/v1
kind: Deployment
metadata:
  name: users-deployment
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: users-api
  template:
    metadata:
      labels:
        app: users-api
    spec:
      containers:
      - name: users-api
        image: fcg-users-api:v1
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        env:
        - name: ConnectionStrings__UsuariosConnection
          valueFrom:
            secretKeyRef:
              name: users-secret
              key: connection-string
        envFrom:
        - configMapRef:
            name: users-config